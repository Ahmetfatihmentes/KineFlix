<style>
        /* Film grain overlay */
        .film-grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");

<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col relative overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">
<div class="film-grain"></div>
<!-- Background Image with Blur -->
<div class="fixed inset-0 z-0 bg-cover bg-center bg-no-repeat blur-sm opacity-30 transform scale-105" data-alt="A dark, moody, out-of-focus background of a classic cinema theater. Deep shadows and subtle, warm gold highlights from vintage wall sconces create a cinematic atmosphere. The scene is nocturnal, sophisticated, and heavily stylized to feel like a premium digital interface backdrop. Subtle film grain texture is present." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCNQgGgdC2pdghzzKx2wqzBiLwpK39SheHwbeXnQy28HD7yRTCM-zVSF4pVFLv1izeqjl0HngyZw_etT1Ofjem1GLtPbwToTOhqmvvKeOUG431HZQBoTkK9CcU8fMqMtzAk3ywI5O_PAENg37d18LexnwV6Vq0Bo3fXSLCSuExMFnDvhAKhXoUv1_nT0tmWHtjZuT5DsUR78f_jOsfwKic_wZa5f6CJq4E2nN-LrnWVBTFCwmkF-tdIyz4D-8qybW6JJW1hi6HtybA');">
</div>
<!-- Gradient Overlay to ensure text readability -->
<div class="fixed inset-0 z-0 bg-gradient-to-b from-surface/80 via-surface/90 to-surface"></div>
<!-- Navigation Suppressed: Transactional Screen (Login) -->
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center relative z-10 px-margin-mobile md:px-margin-desktop py-12 md:py-24">
<div class="w-full max-w-[480px] bg-surface-container-highest/60 backdrop-blur-md rounded-xl border border-outline-variant/30 p-8 md:p-12 shadow-2xl relative overflow-hidden group">
<!-- Subtle hover effect border -->
<div class="absolute inset-0 border border-primary-container/0 group-hover:border-primary-container/20 transition-colors duration-700 rounded-xl pointer-events-none"></div>
<div class="flex flex-col items-center mb-10 text-center">
<!-- Brand Logo -->
<h1 class="font-headline-lg text-headline-lg text-primary tracking-widest mb-4">
                    KineFlix
                </h1>
<h2 class="font-title-md text-title-md text-on-surface">
                    Sinema Zekasına Hoş Geldiniz
                </h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">
                    Lütfen hesabınıza giriş yapın.
                </p>
</div>
<form class="space-y-6 flex flex-col">
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant block uppercase" for="email">
                        E-posta Adresi
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-secondary-container">
                            mail
                        </span>
<input class="w-full bg-transparent border-0 border-b border-secondary-container text-on-surface focus:ring-0 focus:border-primary-container transition-colors duration-300 py-3 pl-8 font-body-md text-body-md placeholder-on-surface-variant/50" id="email" name="email" placeholder="ornek@kineflix.com" required="" type="email"/>
</div>
</div>
<div class="space-y-1">
<div class="flex justify-between items-baseline">
<label class="font-label-md text-label-md text-on-surface-variant block uppercase" for="password">
                            Şifre
                        </label>
<a class="font-label-md text-label-md text-primary hover:text-primary-fixed-dim transition-colors text-[12px]" href="#">
                            Şifremi Unuttum
                        </a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-secondary-container">
                            lock
                        </span>
<input class="w-full bg-transparent border-0 border-b border-secondary-container text-on-surface focus:ring-0 focus:border-primary-container transition-colors duration-300 py-3 pl-8 font-body-md text-body-md placeholder-on-surface-variant/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="pt-4">
<button class="w-full bg-primary-container text-on-primary-container font-label-md text-label-md py-4 rounded-DEFAULT uppercase tracking-widest hover:bg-primary-fixed-dim transition-all duration-300 flex justify-center items-center gap-2 transform active:scale-95" type="submit">
<span>Giriş Yap</span>
<span class="material-symbols-outlined text-[18px]">
                            arrow_forward
                        </span>
</button>
</div>
</form>
<div class="mt-8 text-center border-t border-outline-variant/30 pt-6">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Hesabın yok mu? 
                    <a class="text-primary hover:text-primary-fixed-dim font-bold transition-colors" href="#">
                        Kayıt Ol
                    </a>
</p>
</div>
</div>
</main>
<!-- Footer Suppressed on Transactional Screens to keep focus -->
