<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>

                        "primary-fixed": "#ffe08f",
                        "primary-container": "#c9a84c",
                        "on-tertiary-fixed": "#002113",
                        "on-tertiary-fixed-variant": "#005236",
                        "primary": "#e6c364",
                        "on-tertiary-container": "#004a30",
                        "inverse-surface": "#dfe2f0",
                        "on-background": "#dfe2f0",
                        "outline-variant": "#4d4637",
                        "on-primary-fixed-variant": "#584400",
                        "surface-container-highest": "#31353f",
                        "tertiary-container": "#5cbe90",
                        "surface-container-high": "#262a34",
                        "surface-container-lowest": "#0a0e17",
                        "on-error": "#690005",
                        "on-surface": "#dfe2f0",
                        "error-container": "#93000a",

                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",

                    "spacing": {

<style>
        .film-grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 50;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        
        /* Subtle film reel pattern background */
        body {
            background-color: #070B14;
            background-image: radial-gradient(circle at 50% 50%, rgba(20, 25, 40, 0.4) 0%, transparent 100%),
                              repeating-linear-gradient(0deg, transparent, transparent 19px, rgba(30, 58, 95, 0.05) 20px),
                              repeating-linear-gradient(90deg, transparent, transparent 19px, rgba(30, 58, 95, 0.05) 20px);
        }

        .genre-chip {
            transition: all 0.3s ease;
        }
        
        .genre-chip.selected {
            background-color: theme('colors.primary-container');
            color: theme('colors.on-primary-container');
            border-color: theme('colors.primary-container');
        }
        
        .genre-chip:not(.selected):hover {
            border-color: theme('colors.primary-container');
            background-color: rgba(201, 168, 76, 0.1);
        }
    </style>
</head>
<body class="text-on-surface min-h-screen flex flex-col relative font-body-md overflow-x-hidden">
<!-- Film Grain Overlay -->
<div class="film-grain"></div>
<!-- Onboarding Navigation Shell Suppressed (Transactional intent) -->
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col justify-center items-center px-margin-mobile md:px-margin-desktop py-12 md:py-24 relative z-10 w-full max-w-container-max mx-auto">
<!-- Header Section -->
<header class="text-center mb-12 md:mb-16 max-w-2xl">
<h1 class="font-display-lg text-display-lg text-primary mb-4 tracking-widest uppercase">Sinema Zevkini Öğren</h1>
<p class="font-title-md text-title-md text-on-surface-variant">En az 3 tür seç, yapay zeka seni tanısın</p>
</header>
<!-- Bento Grid / Genre Selection Area -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 w-full max-w-4xl mb-16" id="genre-container">
<!-- Chips (Using JavaScript to toggle 'selected' class) -->
<button class="genre-chip flex flex-col items-center justify-center p-6 bg-surface-container border border-surface-variant rounded-xl cursor-pointer group" onclick="toggleGenre(this)">
<span class="text-4xl mb-3 group-hover:scale-110 transition-transform duration-300">🚀</span>
<span class="font-label-md text-label-md uppercase tracking-wider">Bilim Kurgu</span>
</button>
<button class="genre-chip flex flex-col items-center justify-center p-6 bg-surface-container border border-surface-variant rounded-xl cursor-pointer group selected" onclick="toggleGenre(this)">
<span class="text-4xl mb-3 group-hover:scale-110 transition-transform duration-300">💥</span>
<span class="font-label-md text-label-md uppercase tracking-wider">Aksiyon</span>
</button>
<button class="genre-chip flex flex-col items-center justify-center p-6 bg-surface-container border border-surface-variant rounded-xl cursor-pointer group selected" onclick="toggleGenre(this)">
<span class="text-4xl mb-3 group-hover:scale-110 transition-transform duration-300">🎭</span>
<span class="font-label-md text-label-md uppercase tracking-wider">Drama</span>
</button>
<button class="genre-chip flex flex-col items-center justify-center p-6 bg-surface-container border border-surface-variant rounded-xl cursor-pointer group" onclick="toggleGenre(this)">
<span class="text-4xl mb-3 group-hover:scale-110 transition-transform duration-300">😱</span>
<span class="font-label-md text-label-md uppercase tracking-wider">Gerilim</span>
</button>
<button class="genre-chip flex flex-col items-center justify-center p-6 bg-surface-container border border-surface-variant rounded-xl cursor-pointer group" onclick="toggleGenre(this)">
<span class="text-4xl mb-3 group-hover:scale-110 transition-transform duration-300">😂</span>
<span class="font-label-md text-label-md uppercase tracking-wider">Komedi</span>
</button>
<button class="genre-chip flex flex-col items-center justify-center p-6 bg-surface-container border border-surface-variant rounded-xl cursor-pointer group selected" onclick="toggleGenre(this)">
<span class="text-4xl mb-3 group-hover:scale-110 transition-transform duration-300">🔍</span>
<span class="font-label-md text-label-md uppercase tracking-wider">Gizem</span>
</button>
<button class="genre-chip flex flex-col items-center justify-center p-6 bg-surface-container border border-surface-variant rounded-xl cursor-pointer group" onclick="toggleGenre(this)">
<span class="text-4xl mb-3 group-hover:scale-110 transition-transform duration-300">📽️</span>
<span class="font-label-md text-label-md uppercase tracking-wider">Belgesel</span>
</button>
<button class="genre-chip flex flex-col items-center justify-center p-6 bg-surface-container border border-surface-variant rounded-xl cursor-pointer group" onclick="toggleGenre(this)">
<span class="text-4xl mb-3 group-hover:scale-110 transition-transform duration-300">🧪</span>
<span class="font-label-md text-label-md uppercase tracking-wider">Fantastik</span>
</button>
</div>
<!-- Sticky Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full bg-surface/90 backdrop-blur-md border-t border-surface-variant/50 p-4 md:p-6 flex flex-col md:flex-row items-center justify-between z-40">
<div class="mb-4 md:mb-0 flex items-center">
<div class="w-32 h-1 bg-surface-variant rounded-full mr-4 overflow-hidden">
<div class="h-full bg-primary transition-all duration-300" id="progress-bar" style="width: 37.5%;"></div>
</div>
<span class="font-label-md text-label-md text-on-surface-variant tracking-widest uppercase" id="selection-count">3/8 seçildi</span>
</div>
<button class="bg-primary-container text-on-primary-container font-label-md text-label-md uppercase tracking-wider py-4 px-8 rounded-DEFAULT hover:bg-primary transition-colors flex items-center shadow-[0_0_15px_rgba(201,168,76,0.3)]" id="submit-btn">
                Keşfetmeye Başla
                <span class="material-symbols-outlined ml-2" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</div>
<!-- Pad bottom to prevent overlap with sticky footer -->
<div class="h-24"></div>
</main>
<script>
        function toggleGenre(element) {
            element.classList.toggle('selected');
            updateCount();
        }

        function updateCount() {
            const selectedCount = document.querySelectorAll('.genre-chip.selected').length;
            const totalCount = document.querySelectorAll('.genre-chip').length;
            
            // Update text
            document.getElementById('selection-count').textContent = `${selectedCount}/${totalCount} seçildi`;
            
            // Update progress bar
            const percentage = (selectedCount / totalCount) * 100;
            document.getElementById('progress-bar').style.width = `${percentage}%`;

            // Update button state visually
            const btn = document.getElementById('submit-btn');
            if(selectedCount >= 3) {
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.classList.add('hover:bg-primary', 'shadow-[0_0_15px_rgba(201,168,76,0.3)]');
            } else {
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                btn.classList.remove('hover:bg-primary', 'shadow-[0_0_15px_rgba(201,168,76,0.3)]');
            }
        }
        
        // Initial state
        document.addEventListener('DOMContentLoaded', updateCount);
    </script>
</body></html>
