<style>
        .film-grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
        }
        
        body {
            background-color: #0f131d;
        }

        .input-box {
            background-color: #1b2029;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-box:focus-within {
            border-color: #e6c364;
            outline: none;
        }
        
        .btn-primary {
            background-color: #e6c364;
            color: #000000;
        }
        
        .btn-outline {
            border: 1px solid #e6c364;
            color: #e6c364;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="text-on-background min-h-screen flex flex-col items-center justify-center font-body-lg overflow-x-hidden p-margin-mobile">
<!-- Global Film Grain -->
<div class="film-grain"></div>
<!-- Main Container -->
<main class="w-full max-w-[390px] flex flex-col relative z-10">
<!-- Top Logo -->
<div class="text-center mb-xl">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-[0.2em] font-bold">KINEFLIX</h1>
</div>
<!-- Headline -->
<div class="mb-lg text-center">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background">GİRİŞ YAP</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Sinematik dünyaya hoş geldiniz</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-md">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase" for="email">E-POSTA</label>
<div class="input-box flex items-center px-md py-sm rounded-none transition-colors duration-200">
<span class="material-symbols-outlined text-on-surface-variant mr-sm text-[20px]" data-icon="mail">mail</span>
<input class="w-full bg-transparent border-none text-on-background font-body-md text-body-md focus:ring-0 placeholder:text-on-surface-variant/50 px-0" id="email" placeholder="ornek@kineflix.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant uppercase" for="password">ŞİFRE</label>
<a class="font-label-md text-label-md text-primary hover:opacity-80 transition-opacity" href="#">Şifremi Unuttum</a>
</div>
<div class="input-box flex items-center px-md py-sm rounded-none transition-colors duration-200">
<span class="material-symbols-outlined text-on-surface-variant mr-sm text-[20px]" data-icon="lock">lock</span>
<input class="w-full bg-transparent border-none text-on-background font-body-md text-body-md focus:ring-0 placeholder:text-on-surface-variant/50 px-0" id="password" placeholder="••••••••" type="password"/>
<button class="text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="btn-primary w-full py-md mt-sm rounded-none font-label-md text-label-md uppercase tracking-wider hover:opacity-90 active:scale-[0.98] transition-all flex justify-center items-center gap-sm" type="submit">
<span>GİRİŞ YAP</span>
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center my-lg">
<div class="flex-grow border-t border-outline-variant/50"></div>
<span class="px-md font-label-md text-label-md text-on-surface-variant">VEYA</span>
<div class="flex-grow border-t border-outline-variant/50"></div>
</div>
<!-- Social Login -->
<div class="flex flex-col gap-sm">
<button class="btn-outline w-full py-sm rounded-none font-label-md text-label-md flex justify-center items-center gap-md hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
<span>GOOGLE İLE GİRİŞ YAP</span>
</button>
<button class="btn-outline w-full py-sm rounded-none font-label-md text-label-md flex justify-center items-center gap-md hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined" data-icon="apple">apps</span>
<span>APPLE İLE GİRİŞ YAP</span>
</button>
</div>
<!-- Sign Up Link -->
<div class="mt-xl text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Hesabın yok mu? 
                <a class="text-primary font-bold hover:underline underline-offset-4 decoration-1" href="#">Kayıt Ol</a>
</p>
</div>
</main>
</body></html>
