<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .film-grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");

        .sharp-edges {
            border-radius: 0 !important;

    body {
      min-height: max(884px, 100dvh);

<body class="bg-[#0f131d] text-on-background antialiased min-h-screen flex flex-col items-center justify-center relative px-margin-mobile">
<div class="film-grain"></div>
<div class="w-full max-w-[390px] relative z-10 flex flex-col min-h-screen pt-12 pb-8">
<!-- Header -->
<header class="w-full text-center mb-xl">
<h1 class="font-display-lg text-display-lg text-primary tracking-widest uppercase">KINEFLIX</h1>
</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col justify-center">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-lg text-center uppercase">KAYIT OL</h2>
<form class="flex flex-col gap-md">
<!-- E-Posta -->
<div class="flex flex-col">
<label class="font-label-md text-label-md text-on-surface-variant mb-xs uppercase" for="email">E-POSTA</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="mail">mail</span>
<input class="w-full bg-[#1b2029] border border-white/10 text-on-surface font-body-lg text-body-lg py-sm pl-xl pr-sm sharp-edges focus:border-b-primary focus:border-t-white/10 focus:border-l-white/10 focus:border-r-white/10 focus:ring-0 transition-colors" id="email" placeholder="E-posta adresiniz" type="email"/>
</div>
</div>
<!-- Şifre -->
<div class="flex flex-col">
<label class="font-label-md text-label-md text-on-surface-variant mb-xs uppercase" for="password">ŞİFRE</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="lock">lock</span>
<input class="w-full bg-[#1b2029] border border-white/10 text-on-surface font-body-lg text-body-lg py-sm pl-xl pr-sm sharp-edges focus:border-b-primary focus:border-t-white/10 focus:border-l-white/10 focus:border-r-white/10 focus:ring-0 transition-colors" id="password" placeholder="Şifreniz" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Şifre Onayı -->
<div class="flex flex-col">
<label class="font-label-md text-label-md text-on-surface-variant mb-xs uppercase" for="password_confirm">ŞİFRE ONAYI</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="lock">lock</span>
<input class="w-full bg-[#1b2029] border border-white/10 text-on-surface font-body-lg text-body-lg py-sm pl-xl pr-sm sharp-edges focus:border-b-primary focus:border-t-white/10 focus:border-l-white/10 focus:border-r-white/10 focus:ring-0 transition-colors" id="password_confirm" placeholder="Şifrenizi tekrar girin" type="password"/>
</div>
</div>
<!-- Action Button -->
<button class="mt-lg w-full bg-primary text-on-primary font-title-lg text-title-lg py-md sharp-edges hover:bg-primary-fixed transition-colors active:scale-95 flex items-center justify-center gap-xs uppercase" type="submit">
                    KAYIT OL
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="mt-xl text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Zaten üye misiniz? <a class="text-primary hover:underline ml-xs" href="#">Giriş Yap</a>
</p>
</div>
</main>
<!-- Footer Links -->
<footer class="mt-auto pt-lg border-t border-outline-variant/50 flex justify-center gap-md">
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors uppercase" href="#">Yardım</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors uppercase" href="#">Gizlilik</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors uppercase" href="#">Şartlar</a>
</footer>
</div>
</body></html>
