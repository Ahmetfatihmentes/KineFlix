<script>
        // Simple interaction for the close buttons
        document.querySelectorAll('button:has(.material-symbols-outlined:contains("close"))').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                const card = this.closest('.group');
                card.style.opacity = '0';
                card.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    card.style.display = 'none';
                }, 300);
            });
        });

        // Add jQuery-like pseudo-selector for text content to make the above script work simply
        // Real implementation would use more robust classes or data attributes
        const nativeMatches = Element.prototype.matches;
        Element.prototype.matches = function(s) {
            const match = s.match(/:contains\("([^"]+)"\)/);
            if (match) {
                return this.textContent.includes(match[1]) && nativeMatches.call(this, s.replace(match[0], ''));
            }
            return nativeMatches.call(this, s);
        };
    </script>
